services:
    postgres:
        image: postgres:15.17-trixie
        container_name: postgres-algostore-daa
        restart: always
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_SERVER=db
            - POSTGRES_USER=vikas
            - POSTGRES_DB=postgres-algostore-daa
            - POSTGRES_PASSWORD=letmein
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "vikas", "-d", "postgres-algostore-daa"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: celery-broker-redis
        restart: always
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5 

    minio:
        image: minio/minio:latest
        container_name: minio-algostore-daa
        restart: always
        ports:
            - "9000:9000"  # S3 API Port
            - "9001:9001"  # Web Console UI Port
        environment:
            - MINIO_ROOT_USER=minioadmin
            - MINIO_ROOT_PASSWORD=daa-storages
        volumes:
            - minio_data:/data
        command: server /data --console-address ":9001"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 20s
            retries: 3

volumes:
    postgres_data:
    minio_data: